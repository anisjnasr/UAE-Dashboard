<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>UAE Real Estate Market Scanner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #050505; --bg-card: #131313; --bg-row-even: #080808; --bg-row-odd: #0d0d0d;
      --border: #1f1f1f; --border-active: #333;
      --text: #d1d5db; --text-bright: #f3f4f6; --text-dim: #b4b4b4;
      --text-muted: #a1a1aa; --text-faint: #52525b;
      --accent-green: #34d399; --accent-blue: #60a5fa; --accent-red: #ef4444;
      --link-border: #555; --area-link-border: #737373;
      --info-border: #555; --info-hover-border: #999;
      --popup-bg: #1a1a1a; --popup-border: #333;
      --btn-active-bg: #1c1c1c; --hover-row: rgba(96,165,250,0.04);
      --disabled: #3f3f46; --sep: #1f1f1f;
      --tier-p: #34d399; --tier-p-bg: rgba(52,211,153,0.08); --tier-p-bdr: rgba(52,211,153,0.25);
      --tier-e: #60a5fa; --tier-e-bg: rgba(96,165,250,0.08); --tier-e-bdr: rgba(96,165,250,0.25);
      --tier-m: #c084fc; --tier-m-bg: rgba(192,132,252,0.08); --tier-m-bdr: rgba(192,132,252,0.25);
      --tier-x: #fbbf24; --tier-x-bg: rgba(251,191,36,0.08); --tier-x-bdr: rgba(251,191,36,0.25);
      --toggle-bg: #1c1c1c; --toggle-border: #333; --toggle-icon: #fbbf24;
    }

    body.light {
      --bg: #f5f6f8; --bg-card: #ffffff; --bg-row-even: #ffffff; --bg-row-odd: #f8f9fb;
      --border: #e0e3e8; --border-active: #a0a4ab;
      --text: #111827; --text-bright: #030712; --text-dim: #1f2937;
      --text-muted: #374151; --text-faint: #6b7280;
      --accent-green: #047857; --accent-blue: #1d4ed8; --accent-red: #b91c1c;
      --link-border: #6b7280; --area-link-border: #6b7280;
      --info-border: #6b7280; --info-hover-border: #111827;
      --popup-bg: #ffffff; --popup-border: #d1d5db;
      --btn-active-bg: #e8eaed; --hover-row: rgba(37,99,235,0.05);
      --disabled: #9ca3af; --sep: #d1d5db;
      --tier-p: #047857; --tier-p-bg: rgba(4,120,87,0.12); --tier-p-bdr: rgba(4,120,87,0.35);
      --tier-e: #1d4ed8; --tier-e-bg: rgba(29,78,216,0.10); --tier-e-bdr: rgba(29,78,216,0.30);
      --tier-m: #7c3aed; --tier-m-bg: rgba(124,58,237,0.10); --tier-m-bdr: rgba(124,58,237,0.30);
      --tier-x: #b45309; --tier-x-bg: rgba(180,83,9,0.12); --tier-x-bdr: rgba(180,83,9,0.35);
      --toggle-bg: #ffffff; --toggle-border: #d1d5db; --toggle-icon: #374151;
    }

    body { margin: 0; padding: 24px; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; font-size: 15px; transition: background 0.25s, color 0.25s; }
    h1 { font-size: 26px; font-weight: 700; color: var(--text-bright); margin: 0 0 4px 0; letter-spacing: -0.3px; text-align: center; }
    .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 18px; line-height: 1.5; text-align: center; }
    .kpi-section { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
    .kpi-section-title { font-size: 11px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--text-muted); min-width: 68px; padding-top: 14px; flex-shrink: 0; }
    .kpi-section-blocks { flex: 1; display: flex; flex-direction: column; gap: 10px; min-width: 0; }
    .kpis { display: flex; gap: 10px; justify-content: flex-start; flex-wrap: wrap; }
    .kpi { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; text-align: center; flex: 1; min-width: 100px; max-width: 160px; transition: background 0.25s, border-color 0.25s; }
    .kpi .label { font-size: 12px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-muted); }
    .kpi .value { font-family: 'IBM Plex Mono', monospace; font-weight: 700; font-size: 22px; margin-top: 3px; color: var(--text-bright); }
    .kpi .value .sub { color: var(--text-muted); font-size: 13px; font-weight: 400; }
    .kpi.accent .value { color: var(--accent-green); }
    .kpi.red .value { color: var(--accent-red); }
    .filter-group { margin-bottom: 14px; text-align: center; }
    .filter-label { font-size: 12px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 7px; }
    .filter-row { display: flex; gap: 7px; flex-wrap: wrap; align-items: center; justify-content: center; }
    .kpi .value a { color: inherit; text-decoration: none; border-bottom: 1px dotted var(--link-border); }
    .kpi .value a:hover { color: var(--accent-blue); border-color: var(--accent-blue); }
    .fbtn { padding: 6px 16px; font-size: 13px; font-weight: 600; border-radius: 6px; cursor: pointer; border: 1px solid var(--border); background: transparent; color: var(--text-muted); white-space: nowrap; transition: background 0.15s, border-color 0.15s, color 0.15s; }
    .fbtn.active { color: var(--text-bright); background: var(--btn-active-bg); border-color: var(--border-active); }
    .view-tabs { display: flex; gap: 2px; background: var(--bg-card); border-radius: 6px; padding: 3px; border: 1px solid var(--border); }
    .view-tab { padding: 5px 14px; font-size: 13.5px; font-weight: 600; cursor: pointer; border: none; border-radius: 4px; background: transparent; color: var(--text-muted); transition: background 0.15s, color 0.15s; }
    .view-tab.active { background: var(--btn-active-bg); color: var(--text-bright); }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { padding: 8px 10px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-muted); border-bottom: 1px solid var(--border); text-align: right; cursor: pointer; user-select: none; white-space: nowrap; transition: color 0.15s; }
    th:hover { color: var(--text-bright); }
    th .sort-arrow { font-size: 10px; margin-left: 3px; color: var(--accent-blue); }
    th.left { text-align: left; }
    td { padding: 8px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 13.5px; text-align: right; color: var(--text); }
    td.left { text-align: left; font-family: 'Inter', sans-serif; font-size: 14px; }
    tr:hover { background: var(--hover-row) !important; }
    .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 12px; background: var(--bg-card); transition: background 0.25s, border-color 0.25s; }
    .table-wrap.drops-table { border-color: rgba(239,68,68,0.25); }
    .footer { margin-top: 18px; padding: 12px 14px; background: var(--bg-card); border-radius: 8px; border: 1px solid var(--border); font-size: 12.5px; color: var(--text-muted); line-height: 1.7; }
    .filters { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    select, input[type="number"] { background: var(--bg-card); border: 1px solid var(--border); border-radius: 6px; color: var(--text-bright); padding: 5px 10px; font-size: 13px; font-family: 'Inter', sans-serif; }
    .pagination { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 13px; }
    .badge { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 11.5px; font-weight: 700; }
    .conf-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 7px; flex-shrink: 0; }
    .area-link { cursor: pointer; border-bottom: 1px dotted var(--area-link-border); }
    .pg-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text); border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px; font-family: 'Inter', sans-serif; }
    .pg-btn:disabled { color: var(--disabled); cursor: default; }
    .info-i { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; border: 1px solid var(--info-border); font-size: 10px; font-weight: 700; font-style: italic; color: var(--text-muted); cursor: help; vertical-align: middle; margin-left: 4px; }
    .info-i:hover { color: var(--text-bright); border-color: var(--info-hover-border); }
    .info-popup { position: fixed; background: var(--popup-bg); color: var(--text); border: 1px solid var(--popup-border); border-radius: 8px; padding: 12px 16px; font-size: 13px; font-style: normal; font-weight: 400; line-height: 1.6; max-width: 380px; z-index: 1000; pointer-events: none; box-shadow: 0 8px 24px rgba(0,0,0,0.25); }
    .drop-val { color: var(--accent-red); font-weight: 600; }
    .bld-link { color: var(--text-bright); text-decoration: none; border-bottom: 1px dotted var(--link-border); }
    .bld-link:hover { color: var(--accent-blue); border-color: var(--accent-blue); }
    .sep { width: 1px; height: 22px; background: var(--sep); margin: 0 6px; }

    .theme-toggle { position: fixed; top: 18px; right: 24px; z-index: 999; width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--toggle-border); background: var(--toggle-bg); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.25s, border-color 0.25s; }
    .theme-toggle:hover { border-color: var(--text-muted); }
    .theme-toggle svg { width: 20px; height: 20px; fill: none; stroke: var(--toggle-icon); stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; transition: stroke 0.25s; }

    .header-row { display: flex; justify-content: space-between; align-items: flex-start; }
    .mobile-filter-dock { position: static; }
    .quick-filter-bar { display: none; }
    .quick-chip-group { display: flex; gap: 6px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .quick-chip-group::-webkit-scrollbar { display: none; }
    .dropdown-filters { display: grid; grid-template-columns: repeat(4, minmax(140px, 1fr)); gap: 8px; margin-bottom: 10px; }
    .top-filters-wrap { margin-bottom: 16px; }
    .areas-inline { margin-bottom: 12px; }
    .areas-inline-row { display: flex; gap: 7px; overflow-x: auto; white-space: nowrap; padding-bottom: 4px; }
    .areas-inline-row::-webkit-scrollbar { display: none; }
    .drop-highlight-head { display:flex; justify-content:space-between; align-items:center; gap:8px; margin: 8px 0; }
    .drop-tabs { display:flex; gap:6px; }
    .drop-tab { padding:6px 12px; border:1px solid var(--border); border-radius:8px; background:transparent; color:var(--text-muted); cursor:pointer; font-size:12px; font-weight:600; }
    .drop-tab.active { background: var(--btn-active-bg); color: var(--text-bright); border-color: var(--border-active); }

    @media (max-width: 1024px) {
      body { padding: 16px; }
      .kpi-section-title { min-width: 56px; font-size: 10px; padding-top: 12px; }
      .kpis { gap: 10px; }
      .kpi { min-width: 100px; max-width: 160px; padding: 10px 12px; }
      .kpi .value { font-size: 20px; }
      h1 { font-size: 24px; }
      .subtitle { font-size: 13px; margin-bottom: 14px; }
      .theme-toggle { top: 12px; right: 12px; width: 36px; height: 36px; }
      .theme-toggle svg { width: 18px; height: 18px; }
    }

    @media (max-width: 768px) {
      body { padding: 12px; font-size: 14px; }
      h1 { font-size: 21px; margin-top: 30px; }
      .subtitle { font-size: 12px; line-height: 1.4; margin-bottom: 12px; }
      .kpi-section { gap: 10px; margin-bottom: 10px; }
      .kpi-section-title { min-width: 52px; font-size: 10px; padding-top: 10px; }
      .kpis { gap: 8px; }
      .kpi { flex: 1 1 calc(50% - 8px); min-width: 90px; max-width: none; padding: 9px 10px; }
      .kpi .label { font-size: 10px; }
      .kpi .value { font-size: 17px; }
      .mobile-filter-dock {
        position: sticky;
        top: 0;
        z-index: 70;
        margin: 0 -12px 10px -12px;
        padding: 8px 12px 8px 12px;
        background: color-mix(in srgb, var(--bg) 92%, transparent);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid var(--border);
      }
      .filter-group { margin-bottom: 10px; text-align: left; }
      .mobile-filter-dock .filter-group { margin-bottom: 8px; }
      .mobile-filter-dock .filter-group:last-of-type { margin-bottom: 6px; }
      .filter-label { font-size: 11px; margin-bottom: 5px; }
      .filter-row {
        justify-content: flex-start;
        flex-wrap: nowrap;
        overflow-x: auto;
        padding-bottom: 6px;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }
      .filter-row::-webkit-scrollbar, .view-tabs::-webkit-scrollbar { display: none; }
      .fbtn {
        font-size: 12px;
        padding: 9px 13px;
        min-height: 42px;
        border-radius: 10px;
        flex: 0 0 auto;
      }
      .view-tabs {
        width: 100%;
        overflow-x: auto;
        justify-content: flex-start;
        -webkit-overflow-scrolling: touch;
        padding: 5px;
        border-radius: 10px;
      }
      .view-tab {
        font-size: 12px;
        padding: 9px 12px;
        min-height: 42px;
        border-radius: 8px;
        white-space: nowrap;
        flex: 0 0 auto;
      }
      .filters { justify-content: flex-start; gap: 6px; }
      select, input[type="number"] {
        font-size: 13px;
        padding: 8px 10px;
        min-height: 40px;
      }
      th { font-size: 10px; padding: 7px 8px; }
      td { font-size: 12px; padding: 7px 8px; }
      td.left { font-size: 12.5px; }
      .badge { font-size: 10px; padding: 2px 6px; }
      .pagination { font-size: 12px; gap: 6px; flex-wrap: wrap; }
      .pg-btn { font-size: 12px; padding: 8px 10px; min-height: 40px; border-radius: 8px; }
      .footer { margin-top: 12px; padding: 10px; font-size: 11.5px; line-height: 1.6; }
      .table-wrap { margin-bottom: 10px; }
      .dropdown-filters { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 420px) {
      .kpi { flex: 1 1 100%; }
      .kpi .value { font-size: 18px; }
      h1 { font-size: 19px; }
      .theme-toggle { top: 8px; right: 8px; width: 34px; height: 34px; }
      .theme-toggle svg { width: 16px; height: 16px; }
      .mobile-filter-dock { margin: 0 -12px 8px -12px; padding: 8px 12px 6px 12px; }
      .fbtn, .view-tab { min-height: 40px; padding: 8px 11px; }
      .sep { display: none; }
      .quick-filter-bar {
        display: block;
        margin: 0 0 8px 0;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: 10px;
        background: var(--bg-card);
      }
      .quick-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.35px;
        text-transform: uppercase;
        color: var(--text-muted);
        margin: 0 0 4px 2px;
      }
      .quick-chip-group { padding-bottom: 4px; margin-bottom: 6px; scrollbar-width: none; }
      .quick-chip-group:last-child { margin-bottom: 0; }
      .quick-chip {
        min-height: 36px;
        padding: 7px 10px;
        border-radius: 9px;
        border: 1px solid var(--border);
        background: transparent;
        color: var(--text-muted);
        font-size: 11px;
        font-weight: 600;
        white-space: nowrap;
        cursor: pointer;
        flex: 0 0 auto;
      }
      .quick-chip.active {
        color: var(--text-bright);
        background: var(--btn-active-bg);
        border-color: var(--border-active);
      }
    }
  </style>
  <script>
    (function(){var t=localStorage.getItem('theme');if(t==='light')document.documentElement.style.background='#f5f6f8';})();
  </script>
</head>
<body>
  <button class="theme-toggle" id="themeToggle" title="Toggle light/dark theme">
    <svg id="themeIcon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
  </button>
  <div id="root"><div style="margin-bottom:14px;color:var(--text-muted);font-size:14px">Loading data...</div></div>
  <script>
    (function() {
      // --- Theme ---
      const moonPath = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      const sunPath = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      function applyTheme(theme) {
        document.body.classList.toggle('light', theme === 'light');
        document.getElementById('themeIcon').innerHTML = theme === 'light' ? moonPath : sunPath;
        localStorage.setItem('theme', theme);
      }
      const saved = localStorage.getItem('theme') || 'dark';
      applyTheme(saved);
      document.getElementById('themeToggle').onclick = function() {
        const next = document.body.classList.contains('light') ? 'dark' : 'light';
        applyTheme(next);
        if (window.RAW) render();
      };

      function isLight() { return document.body.classList.contains('light'); }

      const DATA_URL = 'data/dashboard_data.json?v=' + Date.now();

      function tierColors() {
        const s = getComputedStyle(document.documentElement);
        const v = n => s.getPropertyValue(n).trim();
        return {
          P: { label: 'Prime', color: v('--tier-p'), bg: v('--tier-p-bg'), bdr: v('--tier-p-bdr') },
          E: { label: 'Established', color: v('--tier-e'), bg: v('--tier-e-bg'), bdr: v('--tier-e-bdr') },
          M: { label: 'Mid-Tier', color: v('--tier-m'), bg: v('--tier-m-bg'), bdr: v('--tier-m-bdr') },
          X: { label: 'Peripheral', color: v('--tier-x'), bg: v('--tier-x-bg'), bdr: v('--tier-x-bdr') }
        };
      }

      const DUBAI_AREAS = [
        'Downtown Dubai','Business Bay','Dubai Marina','DIFC','Palm Jumeirah',
        'Dubai Hills Estate','Dubai Creek Harbour','Jumeirah Lake Towers','Jumeirah Village Circle',
        'Meydan','Dubai South','Arjan','DAMAC Hills','Dubai Silicon Oasis',
        'Greens','Motor City','Town Square','Al Barsha','Bur Dubai',
        'Dubai Sports City','International City'
      ];
      const AD_AREAS = [
        'Al Reem Island','Yas Island','Saadiyat Island','Al Maryah Island',
        'Al Raha Beach','Al Ghadeer','Al Reef','Masdar City','Khalifa City',
        'Al Jubail Island','Al Khalidiya','Corniche Road','Al Bateen','Baniyas'
      ];

      function fmt(n) {
        if (n == null || isNaN(n)) return '\u2014';
        const x = Number(n);
        if (x >= 1e6) return (x / 1e6).toFixed(2).replace(/\.?0+$/, '') + 'M';
        if (x >= 1e3) return (x / 1e3).toFixed(1).replace(/\.0$/, '') + 'K';
        return Math.round(x).toLocaleString();
      }
      function pct(x) { return (x == null || isNaN(x)) ? '\u2014' : Number(x).toFixed(1) + '%'; }

      function fmtFullDateStr(s) {
        if (!s) return '\u2014';
        const d = new Date(s);
        if (isNaN(d.getTime())) return s;
        const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
        const day = d.getDate();
        const monthName = months[d.getMonth()];
        const year = d.getFullYear();
        return day + ' ' + monthName + ' ' + year;
      }

      function fmtShortDateStr(s) {
        if (!s) return '\u2014';
        const d = new Date(s);
        if (isNaN(d.getTime())) return s;
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const day = d.getDate();
        const monthName = months[d.getMonth()];
        const year = d.getFullYear();
        return day + '-' + monthName + '-' + year;
      }

      function render() {
        const RAW = window.RAW;
        if (!RAW || !RAW.l) { document.getElementById('root').innerHTML = '<div style="color:var(--accent-red);font-size:15px">Failed to load data.</div>'; return; }
        const T = tierColors();
        const updatedAtRaw = RAW.u || '';
        const updatedAtLabel = fmtFullDateStr(updatedAtRaw);
        const AREAS = RAW.a || [];
        const LISTINGS = RAW.l.map(l => ({
          building: l[0], area: AREAS[l[1]]||'', price: l[2], sqft: l[3],
          furnished: l[4], grossYield: l[5], netYield: l[6], tier: l[7], conf: l[8],
          scPsf: l[9]||12, city: l[10]||'Dubai', beds: l[11]||'Unknown', url: l[12]||'',
          psf: l[3] ? Math.round(l[2]/l[3]) : 0
        }));
        const SUMMARIES = (RAW.s||[]).map(s => ({
          name: s[0], count: s[1], rentals: s[2], bldgMatch: s[3], areaMatch: s[4],
          avgPrice: s[5], medPrice: s[6], minPrice: s[7], maxPrice: s[8], avgRent: s[9],

        function buildIndexChartHtml(city, type) {

            const yb = yVal(base);
            svg += '<line x1="'+padding+'" y1="'+yb.toFixed(1)+'" x2="'+(width-padding-24)+'" y2="'+yb.toFixed(1)+'" stroke="var(--accent-blue)" stroke-dasharray="4,2" stroke-width="1.2"/>';
            svg += '<text x="'+(width-padding-20)+'" y="'+(yb-3).toFixed(1)+'" fill="var(--accent-blue)" font-size="9" text-anchor="start">Base 100</text>';
          }
          series.forEach(s => {
            const pts = s.pts;
            if (!pts.length) return;
            const n = pts.length;
            let d = '';
            pts.forEach((p,i) => {

          });
          const allVals = [];
          series.forEach(s => s.pts.forEach(p => allVals.push(p.v)));
          const deltas = [];

        const toggleAreasBtn=document.getElementById('toggleAreasBtn');if(toggleAreasBtn)toggleAreasBtn.onclick=()=>{S.areaExpanded=!S.areaExpanded;rerender();};
        document.querySelectorAll('[data-dropview]').forEach(btn=>{btn.onclick=()=>{S.dropView=btn.dataset.dropview;S.dpg=0;S.rdpg=0;rerender();};});
        document.querySelectorAll('.view-tab').forEach(btn=>{btn.onclick=()=>{const v=btn.dataset.view;if(v){S.view=v;S.pg=0;S.dpg=0;S.rdpg=0;}const it=btn.dataset.idxtype;if(it){S.indexType=it;}rerender();};});
        document.querySelectorAll('.area-link').forEach(el=>{el.onclick=()=>{S.areaF=el.dataset.area;S.view='listings';S.pg=0;rerender();};});
        const pP=document.getElementById('prevPg');if(pP)pP.onclick=()=>{S.pg=Math.max(0,S.pg-1);rerender();};
        const nP=document.getElementById('nextPg');if(nP)nP.onclick=()=>{S.pg=Math.min(tp-1,S.pg+1);rerender();};
        const pd=document.getElementById('prevDropPg');if(pd)pd.onclick=()=>{if(S.dropView==='sales'){S.dpg=Math.max(0,S.dpg-1);}else{S.rdpg=Math.max(0,S.rdpg-1);}rerender();};
        const nd=document.getElementById('nextDropPg');if(nd)nd.onclick=()=>{if(S.dropView==='sales'){S.dpg=Math.min(dtp-1,S.dpg+1);}else{S.rdpg=Math.min(rdtp-1,S.rdpg+1);}rerender();};
      }
      window.render = render;
      fetch(DATA_URL).then(r=>r.ok?r.json():Promise.reject()).then(data=>{window.RAW=data;render();}).catch(()=>{window.RAW=null;render();});
    })();
  </script>
</body>
</html>
