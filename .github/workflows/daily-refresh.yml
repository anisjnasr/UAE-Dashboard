# Daily data refresh: fetch Property Finder listings, run process_data.py, commit and push data.
# Runs once at midnight UAE (20:00 UTC).
# Persists data/dashboard_data.json and compressed DB history (data/listings.db.gz).
# Optional: add repository secret FORMSPREE_FORM_ID to get an email after each successful run (see README).

name: Daily data refresh

on:
  schedule:
    # Midnight UAE (UTC+4) = 20:00 UTC
    - cron: "0 20 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-refresh-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Record start time
        run: date +%s > .refresh_start_ts

      - name: Restore listings DB from compressed snapshot
        run: |
          python - <<'PY'
          from pathlib import Path
          import gzip
          import shutil
          import sqlite3

          data_dir = Path("data")
          db_path = data_dir / "listings.db"
          candidates = [data_dir / "listings.db.gz", data_dir / "listings.db.bak.gz"]
          data_dir.mkdir(parents=True, exist_ok=True)

          restored = False
          for gz_path in candidates:
              if not gz_path.exists():
                  continue
              try:
                  with gzip.open(gz_path, "rb") as src, db_path.open("wb") as dst:
                      shutil.copyfileobj(src, dst)
                  conn = sqlite3.connect(str(db_path))
                  check = conn.execute("PRAGMA integrity_check").fetchone()[0]
                  conn.close()
                  if check != "ok":
                      raise RuntimeError(f"Integrity check failed: {check}")
                  print(f"Restored {db_path} from {gz_path}")
                  restored = True
                  break
              except Exception as exc:
                  print(f"Failed restore from {gz_path}: {exc}")
                  if db_path.exists():
                      db_path.unlink()

          if not restored:
              print("No valid compressed DB snapshot found; starting with fresh DB.")
          PY

      - name: Fetch listings
        run: python scripts/fetch_propertyfinder_listings.py

      - name: Process data
        run: python process_data.py

      - name: Compress listings DB for Git persistence
        run: |
          python - <<'PY'
          import sqlite3
          from pathlib import Path
          import gzip
          import shutil

          db = Path("data/listings.db")
          gz = Path("data/listings.db.gz")
          bak = Path("data/listings.db.bak.gz")
          tmp = Path("data/listings.db.tmp.gz")

          if not db.exists():
              print("No listings.db generated; skipping compression.")
              raise SystemExit(0)

          conn = sqlite3.connect(str(db))
          conn.execute("PRAGMA wal_checkpoint(TRUNCATE)")
          conn.execute("VACUUM")
          check = conn.execute("PRAGMA integrity_check").fetchone()[0]
          conn.close()
          if check != "ok":
              raise RuntimeError(f"SQLite integrity_check failed: {check}")

          with db.open("rb") as src, gzip.open(tmp, "wb", compresslevel=9) as dst:
              shutil.copyfileobj(src, dst)
          # Validate gzip content can be read.
          with gzip.open(tmp, "rb") as src:
              src.read(1024)

          if gz.exists():
              shutil.copy2(gz, bak)
          tmp.replace(gz)

          print(f"Compressed {db.stat().st_size} bytes -> {gz.stat().st_size} bytes")
          PY

      - name: Commit and push data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          git add data/dashboard_data.json
          [ -f data/listings.db.gz ] && git add -f data/listings.db.gz
          [ -f data/listings.db.bak.gz ] && git add -f data/listings.db.bak.gz
          for f in "data/Multiple Cities - multiple unit types - sales data.json" "data/Multiple Cities - multiple unit types - rental data.json"; do
            [ -f "$f" ] && git add "$f"
          done
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "Daily data refresh ($(date -u +'%Y-%m-%d %H:%M UTC'))"
            git push origin HEAD:main
          fi

      - name: Upload DB snapshots as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: listings-db-snapshots
          path: |
            data/listings.db.gz
            data/listings.db.bak.gz
          if-no-files-found: ignore
          retention-days: 30

      - name: Notify on success (optional)
        if: success()
        env:
          FORMSPREE_FORM_ID: ${{ secrets.FORMSPREE_FORM_ID }}
        run: |
          if [ -z "$FORMSPREE_FORM_ID" ]; then
            exit 0
          fi
          start_ts=$(cat .refresh_start_ts 2>/dev/null || echo 0)
          end_ts=$(date +%s)
          duration_s=$((end_ts - start_ts))
          mins=$((duration_s / 60))
          secs=$((duration_s % 60))
          DURATION_STR="${mins}m ${secs}s"
          BODY_FILE=$(mktemp)
          {
            echo "Daily data refresh completed at $(date -u +'%Y-%m-%d %H:%M UTC')."
            echo "Duration: ${DURATION_STR}"
            echo ""
            if [ -f data/refresh_summary.json ]; then
              echo "SALES LISTINGS RETRIEVED"
              echo "  By city:"
              jq -r '.sales.by_city | to_entries[] | "    \(.key): \(.value | tostring)"' data/refresh_summary.json 2>/dev/null || true
              echo "    Total: $(jq -r '.sales.total' data/refresh_summary.json 2>/dev/null)"
              echo "  By unit type:"
              jq -r '.sales.by_unit_type | to_entries[] | "    \(.key): \(.value | tostring)"' data/refresh_summary.json 2>/dev/null || true
              echo "    Total: $(jq -r '.sales.total' data/refresh_summary.json 2>/dev/null)"
              echo ""
              echo "RENTAL LISTINGS RETRIEVED"
              echo "  By city:"
              jq -r '.rentals.by_city | to_entries[] | "    \(.key): \(.value | tostring)"' data/refresh_summary.json 2>/dev/null || true
              echo "    Total: $(jq -r '.rentals.total' data/refresh_summary.json 2>/dev/null)"
              echo "  By unit type:"
              jq -r '.rentals.by_unit_type | to_entries[] | "    \(.key): \(.value | tostring)"' data/refresh_summary.json 2>/dev/null || true
              echo "    Total: $(jq -r '.rentals.total' data/refresh_summary.json 2>/dev/null)"
            fi
          } > "$BODY_FILE"
          SUBJECT="UAE Dashboard – refresh success (${DURATION_STR})"
          curl -sS -X POST "https://formspree.io/f/${FORMSPREE_FORM_ID}" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "_subject=${SUBJECT}" \
            --data-urlencode "message@${BODY_FILE}"
          rm -f "$BODY_FILE"
